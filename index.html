<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWE Electronics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <nav>
        <div class="container">
          <div class="nav-content">
            <a href="#" class="logo">AWE Electronics</a>
            <ul class="nav-links">
              <li><a href="#" onclick="showHome()">Home</a></li>
              <li><a href="#products">Products</a></li>
              <li>
                <a
                  href="#"
                  onclick="show_orders()"
                  style="
                    .order-status.processing {
                      color: white;
                      background: orange;
                      padding: 2px 8px;
                      border-radius: 4px;
                    }
                  "
                  >Order History</a
                >
              </li>
            </ul>
            <div class="nav-actions">
              <div class="cart-icon" onclick="toggleCart()">
                🛒
                <span class="cart-count" id="cartCount">0</span>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main id="mainContent">
      <!-- Products Section -->
      <section class="products-section" id="products">
        <div class="container">
          <div class="section-header">
            <h2>Featured Products</h2>
          </div>
          <div class="products-grid" id="productsGrid">
            <!-- Products will be dynamically loaded here -->
          </div>
        </div>
      </section>
    </main>

    <!-- Product Detail Section -->
    <section class="product-detail" id="productDetail">
      <div class="container">
        <button onclick="showHome()" style="margin-bottom: 20px">
          ← Back to Products
        </button>
        <div class="product-detail-content" id="productDetailContent"></div>
      </div>
    </section>

    <!-- Order History Section -->
    <section class="order-history" id="orderHistory">
      <div class="container">
        <h2>My Orders</h2>
        <div class="order-list" id="orderList"></div>
      </div>
    </section>

    <!-- Admin Dashboard -->
    <section class="admin-section" id="adminSection">
      <div class="container">
        <h2>Admin Dashboard</h2>
        <div class="admin-nav">
          <button
            class="admin-nav-item active"
            onclick="showAdminTab('overview')"
          >
            Overview
          </button>
          <button class="admin-nav-item" onclick="showAdminTab('products')">
            Manage Products
          </button>
          <button class="admin-nav-item" onclick="showAdminTab('inventory')">
            Inventory
          </button>
          <button class="admin-nav-item" onclick="showAdminTab('reports')">
            Sales Reports
          </button>
        </div>
        <div class="admin-content" id="adminContent"></div>
      </div>
    </section>

    <!-- Shopping Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3>Shopping Cart</h3>
        <span onclick="toggleCart()" style="cursor: pointer; font-size: 24px"
          >×</span
        >
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <button class="btn-checkout" onclick="show_checkout()">
          Proceed to Checkout
        </button>
      </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggle_Cart()"></div>
    <!-- Checkout Modal -->
    <div class="modal" id="checkoutModal">
      <div class="modal-content">
        <span class="modal-close" onclick="close_modal('checkoutModal')"
          >&times;</span
        >

        <h2>Checkout</h2>
        <form onsubmit="processCheckout(event)">
          <h3>Delivery Information</h3>
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" required />
          </div>

          <div>
            <label for="phone">Phone Number</label>
            <input type="tel" id="checkoutPhone" required pattern="\d{10}" />
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="checkoutEmail" required />
          </div>
          <div class="form-group">
            <label for="address">Street Address</label>
            <input type="text" id="address" required />
          </div>
          <div class="form-group">
            <label for="suburb">Suburb</label>
            <input type="text" id="suburb" required />
          </div>
          <div class="form-group">
            <label for="postcode">Postcode</label>
            <input type="text" id="postcode" pattern="[0-9]{4}" required />
          </div>
          <div class="form-group">
            <label for="state">State</label>
            <select id="state" required>
              <option value="">Select State</option>
              <option value="VIC">Victoria</option>
              <option value="NSW">New South Wales</option>
              <option value="QLD">Queensland</option>
              <option value="SA">South Australia</option>
              <option value="WA">Western Australia</option>
              <option value="TAS">Tasmania</option>
              <option value="NT">Northern Territory</option>
              <option value="ACT">Australian Capital Territory</option>
            </select>
          </div>

          <h3>Payment Method</h3>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="credit" checked />
              Credit Card
            </label>
          </div>

          <!-- Credit Card Details -->
          <div class="form-group">
            <label for="cardHolder">Card Holder Name</label>
            <input type="text" id="cardHolder" required />
          </div>
          <div id="cardDetails" class="card-details">
            <div class="form-group">
              <label for="cardNumber">Card Number</label>
              <input type="text" id="cardNumber" required pattern="\d{16}" />
            </div>
            <div class="form-group">
              <label for="cardExpiry">Expiry Date (MM/YY)</label>
              <input
                type="text"
                id="cardExpiry"
                required
                pattern="\d{2}/\d{2}"
              />
            </div>
            <div class="form-group">
              <label for="cardCVV">CVC</label>
              <input type="text" id="cardCVV" required pattern="\d{3}" />
            </div>
          </div>

          <button type="submit" class="btn-submit">Complete Order</button>
        </form>
      </div>
    </div>

    

    <script src="main.js"></script>
  </body>
</html>
